# Azure Deployments Configuration
# This file defines target repositories for automated Azure deployment
# Each repository can have custom configuration overrides

repositories:
  # Default Snowflake Azure WebApp deployment
  snowflake_azure:
    # GitHub repository (format: owner/repo)
    github: CADViewer/cadviewer-conversion-server-ai-azure-webapp
    # Target branch
    branch: master
    # Optional: Override specific config values in CADViewer_config.json
    # All overrides are applied on top of the base config
    config_overrides:
      # Secrets are automatically scrubbed, but you can add custom overrides here
      ServerLocation: "D:\\home\\site\\wwwroot\\cadviewer-conversion-server-ai/"
      folderLocation: "D:\\home\\site\\wwwroot\\cadviewer-conversion-server-ai/content"
      folderLocationDemoUser: "D:\\home\\site\\wwwroot\\cadviewer-conversion-server-ai/content/demo_user"
      ServerPort: ""
      ServerUrl: "http://0.0.0.0"
      webapp: "azure"
      SNOWFLAKE_AGENT_SCHEMA: "CADVIEWER"
      SNOWFLAKE_AGENT_DATABASE: "CADVIEWER_TEST"
      SNOWFLAKE_AGENT_DATABASE_: "CADVIEWER_PROD"
      SNOWFLAKE_AGENT_NAME: "CADVIEWER_AGENT_TEST"
      SNOWFLAKE_AGENT_NAME_: "CADVIEWER_AGENT_PROD"
    # Folders to delete and recreate as empty with .gitkeep
    scrub_folders:
      - "content/vizquery_demo"
      - "content/demo_user"
      - "content/demo3"
      - "content/drawings/dwg"
      - "libs/ai/data/plans"
      

  # Example: Additional deployment target (uncomment to enable)
  # another_azure_deployment:
  #   github: CADViewer/another-azure-repo
  #   branch: main
  #   config_overrides:
  #     someCustomConfig: "custom_value"
  #     enableDemoMode: false
